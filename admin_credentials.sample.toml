# Sample admin credentials for the Church Directory admin interface.
# Copy this file to admin_credentials.toml and set a secure password before use.
#
# Quick setup:
#   python scripts/setup_admin.py
#
# Or generate a bcrypt hash manually:
#   python3 -c "import bcrypt; print(bcrypt.hashpw(b'YOUR_PASSWORD', bcrypt.gensalt(12)).decode())"

[credentials.usernames.admin]
email = "admin@example.com"
name = "Church Admin"
password = "$2b$12$CoNxc1VYEIwkdhCFoEf2o.7ssW7OTqJ8p88tbgd.PQa.VJWtGucCe"

[cookie]
expiry_days = 1
key = "church_directory_auth_key_change_in_production"
name = "church_directory_cookie"
